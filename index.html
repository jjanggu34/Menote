<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetNote — AI 회의록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --highlight: rgba(59,130,246,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .status-badge.idle { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .status-badge.recording { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .status-badge.processing { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    flex: 1;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* Left Panel */
  .left-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* Recording Control Bar */
  .control-bar {
    padding: 20px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .rec-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
  }

  .rec-btn.idle {
    background: var(--accent);
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
  }

  .rec-btn.recording {
    background: var(--red);
    box-shadow: 0 0 20px rgba(239,68,68,0.5);
    animation: rec-pulse 1.5s infinite;
  }

  @keyframes rec-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.5); }
    50% { box-shadow: 0 0 35px rgba(239,68,68,0.8); }
  }

  .rec-btn:hover { transform: scale(1.06); }

  .rec-info {
    flex: 1;
  }

  .rec-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .rec-subtitle {
    font-size: 12px;
    color: var(--text2);
  }

  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }

  .wave-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    transition: height 0.1s;
    opacity: 0.7;
  }

  /* Transcript Area */
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }

  .transcript-area::-webkit-scrollbar { width: 6px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    gap: 12px;
    text-align: center;
  }

  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  .transcript-entry {
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
    animation: fade-in 0.3s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .transcript-entry:hover { border-color: var(--accent); }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .entry-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .entry-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .keyword-highlight {
    background: rgba(59,130,246,0.25);
    color: var(--accent2);
    border-radius: 3px;
    padding: 1px 4px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .keyword-highlight:hover { background: rgba(59,130,246,0.45); }

  /* Bottom: Summary */
  .summary-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .summary-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    padding: 10px 18px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .summary-content {
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text2);
    max-height: 150px;
    overflow-y: auto;
  }

  .summary-content .loading-dots::after {
    content: '...';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  .generate-btn {
    margin: 0 20px 16px;
    padding: 9px 18px;
    background: var(--highlight);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 8px;
    color: var(--accent);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    width: calc(100% - 40px);
    justify-content: center;
  }

  .generate-btn:hover { background: rgba(59,130,246,0.25); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Right Panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
  }

  /* Search Box */
  .search-box {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 36px 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input-wrap input:focus { border-color: var(--accent); }

  .search-input-wrap button {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    transition: color 0.15s;
  }

  .search-input-wrap button:hover { color: var(--accent); }

  .search-source-btns {
    display: flex;
    gap: 6px;
  }

  .source-btn {
    flex: 1;
    padding: 6px;
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .source-btn.active {
    border-color: var(--accent);
    background: var(--highlight);
    color: var(--accent);
  }

  /* Auto-search keyword chips */
  .keyword-chips {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip-label {
    font-size: 11px;
    color: var(--text3);
    width: 100%;
    margin-bottom: 2px;
  }

  .chip {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }

  .chip:hover, .chip.active {
    border-color: var(--accent);
    background: var(--highlight);
    color: var(--accent);
  }

  /* Search Results */
  .search-results {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .search-results::-webkit-scrollbar { width: 4px; }
  .search-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .result-item {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    animation: fade-in 0.25s ease;
  }

  .result-item:hover { border-color: var(--accent); background: var(--highlight); }

  .result-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-meta {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  .result-source {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .source-drive { background: rgba(16,185,129,0.15); color: var(--green); }
  .source-local { background: rgba(245,158,11,0.15); color: var(--yellow); }

  .file-icon { font-size: 16px; }

  .no-results {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 30px 0;
  }

  .searching-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text3);
    font-size: 12px;
    padding: 10px 0;
    justify-content: center;
  }

  .spin {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* API Key Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h2 { font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-primary {
    padding: 9px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    font-weight: 500;
  }

  .btn-primary:hover { opacity: 0.88; }

  .btn-ghost {
    padding: 9px 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }

  .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* GDRIVE Connect banner */
  .connect-banner {
    padding: 12px 16px;
    background: rgba(16,185,129,0.08);
    border-bottom: 1px solid rgba(16,185,129,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .connect-banner p { font-size: 12px; color: var(--green); flex: 1; }

  .connect-btn {
    font-size: 11px;
    padding: 5px 12px;
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 6px;
    color: var(--green);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .connect-btn:hover { background: rgba(16,185,129,0.3); }

  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
    height: 14px;
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }

  .summary-list { list-style: none; }
  .summary-list li { padding: 4px 0; display: flex; gap: 8px; }
  .summary-list li::before { content: '▸'; color: var(--accent); flex-shrink: 0; }

  .action-items { margin-top: 10px; }
  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
  }

  .action-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .action-check.checked { background: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- API Key Modal -->
<div class="modal-overlay show" id="apiModal">
  <div class="modal">
    <h2>⚙️ API 키 설정</h2>
    <p>회의록 요약 및 AI 기능을 사용하려면 Anthropic API 키가 필요합니다.<br>키는 브라우저 내 메모리에만 저장되며 서버로 전송되지 않습니다.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <div class="modal-btns">
      <button class="btn-ghost" onclick="skipApiKey()">나중에</button>
      <button class="btn-primary" onclick="saveApiKey()">저장 & 시작</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    MeetNote
  </div>
  <div class="header-right">
    <span class="status-badge idle" id="statusBadge">대기중</span>
    <button class="settings-btn" onclick="document.getElementById('apiModal').classList.add('show')">⚙️ API 키</button>
  </div>
</header>

<!-- Main Layout -->
<div class="layout">

  <!-- Left: Transcript + Summary -->
  <div class="left-panel">

    <!-- Recording Controls -->
    <div class="control-bar">
      <button class="rec-btn idle" id="recBtn" onclick="toggleRecording()">🎙️</button>
      <div class="rec-info">
        <div class="rec-title" id="recTitle">녹음 시작</div>
        <div class="rec-subtitle" id="recSubtitle">버튼을 눌러 회의를 시작하세요</div>
      </div>
      <div class="timer" id="timer">00:00</div>
      <div class="waveform" id="waveform">
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
        <div class="wave-bar" style="height:6px"></div>
      </div>
    </div>

    <!-- Transcript -->
    <div class="transcript-area" id="transcriptArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎙️</div>
        <div class="empty-text">
          녹음을 시작하면 실시간으로<br>회의 내용이 여기에 표시됩니다.<br><br>
          <span style="color:var(--accent); font-size:12px;">감지된 키워드로 자동 파일 검색</span>
        </div>
      </div>
    </div>

    <!-- Summary Section -->
    <div class="summary-bar">
      <div class="summary-tabs">
        <button class="tab-btn active" onclick="switchTab('summary', this)">📋 요약</button>
        <button class="tab-btn" onclick="switchTab('actions', this)">✅ 액션 아이템</button>
        <button class="tab-btn" onclick="switchTab('keywords', this)">🔑 키워드</button>
      </div>
      <div class="summary-content" id="summaryContent">
        <span style="color:var(--text3); font-size:13px;">아래 버튼을 눌러 AI 회의록을 생성하세요.</span>
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateSummary()">
        ✨ AI 회의록 생성
      </button>
    </div>
  </div>

  <!-- Right: File Search -->
  <div class="right-panel">
    <div class="panel-header">
      🔍 파일 검색
    </div>

    <!-- Google Drive connected banner -->
    <div class="connect-banner" id="driveBanner">
      <p>✅ Google Drive 연결됨</p>
    </div>

    <!-- Search Input -->
    <div class="search-box">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="파일명, 키워드 검색..." onkeydown="handleSearchKey(event)" />
        <button onclick="triggerSearch()">🔍</button>
      </div>
      <div class="search-source-btns">
        <button class="source-btn active" id="btn-drive" onclick="toggleSource('drive')">☁️ Drive</button>
        <button class="source-btn active" id="btn-local" onclick="toggleSource('local')">💻 로컬</button>
      </div>
    </div>

    <!-- Auto-detected Keywords -->
    <div class="keyword-chips" id="keywordChips" style="display:none">
      <span class="chip-label">🤖 감지된 키워드 (클릭하여 검색)</span>
    </div>

    <!-- Results -->
    <div class="search-results" id="searchResults">
      <div class="no-results" style="padding-top: 40px;">
        <div style="font-size:36px; margin-bottom:12px; opacity:0.4">📂</div>
        검색어를 입력하거나<br>녹음을 시작하면 자동 검색됩니다
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────
let apiKey = '';
let isRecording = false;
let recognition = null;
let timerInterval = null;
let timerSeconds = 0;
let waveInterval = null;
let allTranscript = [];
let detectedKeywords = new Set();
let activeTab = 'summary';
let searchSources = { drive: true, local: true };
let autoSearchTimer = null;

// ─── API Key ────────────────────────────────────────────
function saveApiKey() {
  const input = document.getElementById('apiKeyInput').value.trim();
  if (input) apiKey = input;
  document.getElementById('apiModal').classList.remove('show');
}

function skipApiKey() {
  document.getElementById('apiModal').classList.remove('show');
}

// ─── Recording ──────────────────────────────────────────
function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;

  let interimDiv = null;

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const result = e.results[i];
      if (result.isFinal) {
        const text = result[0].transcript.trim();
        if (text) {
          addTranscriptEntry(text);
          extractAndSearchKeywords(text);
          if (interimDiv) { interimDiv.remove(); interimDiv = null; }
        }
      } else {
        interim += result[0].transcript;
      }
    }
    // Show interim
    if (interim) {
      if (!interimDiv) {
        interimDiv = document.createElement('div');
        interimDiv.className = 'transcript-entry';
        interimDiv.style.opacity = '0.5';
        interimDiv.style.borderStyle = 'dashed';
        document.getElementById('transcriptArea').appendChild(interimDiv);
      }
      interimDiv.innerHTML = `
        <div class="entry-meta">
          <span class="entry-time">${formatTime(timerSeconds)}</span>
          <span style="font-size:11px; color:var(--text3)">인식 중...</span>
        </div>
        <div class="entry-text">${interim}</div>
      `;
      scrollTranscript();
    }
  };

  recognition.onerror = (e) => {
    console.error('STT Error:', e.error);
    if (e.error === 'no-speech') return;
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) recognition.start(); // restart if still recording
  };

  recognition.start();
  isRecording = true;

  // UI
  document.getElementById('recBtn').className = 'rec-btn recording';
  document.getElementById('recBtn').textContent = '⏹️';
  document.getElementById('recTitle').textContent = '녹음 중';
  document.getElementById('recSubtitle').textContent = '말씀하세요... 자동으로 텍스트 변환됩니다';
  document.getElementById('statusBadge').className = 'status-badge recording';
  document.getElementById('statusBadge').textContent = '● REC';
  document.getElementById('emptyState').style.display = 'none';

  // Timer
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById('timer').textContent = formatTimerDisplay(timerSeconds);
  }, 1000);

  // Waveform animation
  waveInterval = setInterval(animateWave, 100);
}

function stopRecording() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  clearInterval(timerInterval);
  clearInterval(waveInterval);

  // UI
  document.getElementById('recBtn').className = 'rec-btn idle';
  document.getElementById('recBtn').textContent = '🎙️';
  document.getElementById('recTitle').textContent = '녹음 완료';
  document.getElementById('recSubtitle').textContent = `총 ${formatTimerDisplay(timerSeconds)} 녹음됨`;
  document.getElementById('statusBadge').className = 'status-badge idle';
  document.getElementById('statusBadge').textContent = '완료';

  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(b => b.style.height = '6px');
}

function animateWave() {
  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(bar => {
    const h = Math.random() * 26 + 4;
    bar.style.height = h + 'px';
  });
}

// ─── Transcript ─────────────────────────────────────────
function addTranscriptEntry(text) {
  const area = document.getElementById('transcriptArea');
  const div = document.createElement('div');
  div.className = 'transcript-entry';

  const highlightedText = highlightKeywords(text);
  div.innerHTML = `
    <div class="entry-meta">
      <span class="entry-time">${formatTime(timerSeconds)}</span>
    </div>
    <div class="entry-text">${highlightedText}</div>
  `;
  area.appendChild(div);
  allTranscript.push({ time: timerSeconds, text });
  scrollTranscript();
}

function highlightKeywords(text) {
  // Simple: highlight words >= 2 chars that look like nouns/keywords
  return text.replace(/([가-힣a-zA-Z]{2,})/g, (word) => {
    if (isKeyword(word)) {
      return `<span class="keyword-highlight" onclick="searchFromKeyword('${word}')">${word}</span>`;
    }
    return word;
  });
}

function isKeyword(word) {
  const stopwords = new Set(['그리고','하지만','그래서','그런데','이것','저것','입니다','합니다','했습니다','있습니다','없습니다','됩니다','가장','정말','아직','이미','함께','때문에','위해서','대해서','거의','보다','같은','우리','저희','여기','저기','지금','오늘','내일','어제','조금','많이','나중','먼저','다음']);
  if (stopwords.has(word)) return false;
  if (word.length < 2) return false;
  return true;
}

function scrollTranscript() {
  const area = document.getElementById('transcriptArea');
  area.scrollTop = area.scrollHeight;
}

// ─── Keyword Extraction & Auto Search ───────────────────
function extractAndSearchKeywords(text) {
  // Extract meaningful keywords (nouns / terms)
  const words = text.match(/[가-힣a-zA-Z]{2,}/g) || [];
  const newKeywords = words.filter(w => isKeyword(w) && !detectedKeywords.has(w));

  newKeywords.forEach(kw => {
    detectedKeywords.add(kw);
    addKeywordChip(kw);
  });

  // Auto search with a debounce
  if (newKeywords.length > 0) {
    clearTimeout(autoSearchTimer);
    autoSearchTimer = setTimeout(() => {
      const lastKeyword = newKeywords[newKeywords.length - 1];
      document.getElementById('searchInput').value = lastKeyword;
      triggerSearch(lastKeyword);
    }, 800);
  }
}

function addKeywordChip(keyword) {
  const container = document.getElementById('keywordChips');
  container.style.display = 'flex';

  const chip = document.createElement('span');
  chip.className = 'chip';
  chip.textContent = keyword;
  chip.onclick = () => {
    chip.classList.toggle('active');
    searchFromKeyword(keyword);
  };
  container.appendChild(chip);
}

function searchFromKeyword(keyword) {
  document.getElementById('searchInput').value = keyword;
  triggerSearch(keyword);
}

// ─── File Search ────────────────────────────────────────
function toggleSource(source) {
  searchSources[source] = !searchSources[source];
  document.getElementById('btn-' + source).classList.toggle('active', searchSources[source]);
}

function handleSearchKey(e) {
  if (e.key === 'Enter') triggerSearch();
}

async function triggerSearch(overrideQuery) {
  const query = overrideQuery || document.getElementById('searchInput').value.trim();
  if (!query) return;

  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = `
    <div class="searching-indicator">
      <div class="spin"></div> "${query}" 검색 중...
    </div>
  `;

  const results = [];

  // Drive search
  if (searchSources.drive) {
    const driveResults = await searchGoogleDrive(query);
    results.push(...driveResults);
  }

  // Local (simulated)
  if (searchSources.local) {
    const localResults = simulateLocalSearch(query);
    results.push(...localResults);
  }

  renderResults(results, query);
}

async function searchGoogleDrive(query) {
  // Call Claude with Google Drive MCP
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are a file search assistant. When given a search query, search Google Drive for files matching that query. 
Return ONLY a JSON array (no markdown, no explanation) with objects: [{name, id, mimeType, modifiedTime}]. 
Max 5 results. If no results found, return [].`,
        messages: [{ role: "user", content: `Search Google Drive for files related to: "${query}"` }],
        mcp_servers: [{ type: "url", url: "https://drivemcp.googleapis.com/mcp/v1", name: "google-drive" }]
      })
    });

    if (!response.ok) throw new Error('API error');
    const data = await response.json();

    // Parse response
    const textBlock = data.content?.find(c => c.type === 'text');
    if (!textBlock) return [];

    let jsonText = textBlock.text.replace(/```json|```/g, '').trim();
    // Find JSON array in text
    const match = jsonText.match(/\[[\s\S]*\]/);
    if (!match) return [];

    const files = JSON.parse(match[0]);
    return files.map(f => ({
      name: f.name || f.title || 'Untitled',
      meta: formatDriveType(f.mimeType),
      date: f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('ko-KR') : '',
      source: 'drive',
      id: f.id
    }));
  } catch (e) {
    console.error('Drive search error:', e);
    return [];
  }
}

function formatDriveType(mime) {
  const map = {
    'application/vnd.google-apps.document': '📄 Google Docs',
    'application/vnd.google-apps.spreadsheet': '📊 Google Sheets',
    'application/vnd.google-apps.presentation': '📑 Google Slides',
    'application/pdf': '📕 PDF',
    'image/': '🖼️ 이미지',
    'video/': '🎬 동영상',
    'audio/': '🎵 오디오',
    'application/vnd.openxmlformats-officedocument.wordprocessingml': '📝 Word',
    'application/vnd.openxmlformats-officedocument.spreadsheetml': '📊 Excel',
  };
  for (const [k, v] of Object.entries(map)) {
    if (mime?.includes(k)) return v;
  }
  return '📁 파일';
}

function simulateLocalSearch(query) {
  // Simulate local file search based on keywords
  const fakeFiles = [
    { name: `${query}_회의록_2024.docx`, meta: '📝 Word 문서', date: '2024.01.15', source: 'local' },
    { name: `${query}_발표자료.pptx`, meta: '📑 PowerPoint', date: '2024.01.10', source: 'local' },
    { name: `${query}_데이터분석.xlsx`, meta: '📊 Excel', date: '2024.01.08', source: 'local' },
  ];
  // Randomly return 0-2 results to simulate real behavior
  const count = Math.floor(Math.random() * 3);
  return fakeFiles.slice(0, count);
}

function renderResults(results, query) {
  const div = document.getElementById('searchResults');

  if (results.length === 0) {
    div.innerHTML = `<div class="no-results">
      <div style="font-size:28px; margin-bottom:8px; opacity:0.4">🔍</div>
      "<strong>${query}</strong>"에 대한 파일을 찾지 못했습니다
    </div>`;
    return;
  }

  div.innerHTML = `<div style="font-size:11px; color:var(--text3); margin-bottom:10px; font-family:'JetBrains Mono',monospace;">${results.length}개 파일 발견</div>`;

  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div class="result-name">
        <span>${r.meta?.split(' ')[0] || '📁'}</span>
        <span>${r.name}</span>
        <span class="result-source ${r.source === 'drive' ? 'source-drive' : 'source-local'}">
          ${r.source === 'drive' ? '☁️ Drive' : '💻 Local'}
        </span>
      </div>
      <div class="result-meta">${r.meta || ''} ${r.date ? '· ' + r.date : ''}</div>
    `;
    if (r.id) {
      item.onclick = () => window.open(`https://drive.google.com/file/d/${r.id}/view`, '_blank');
    }
    div.appendChild(item);
  });
}

// ─── Summary Generation ─────────────────────────────────
async function generateSummary() {
  if (allTranscript.length === 0) {
    alert('녹음된 내용이 없습니다. 먼저 회의를 녹음해주세요.');
    return;
  }

  if (!apiKey) {
    document.getElementById('apiModal').classList.add('show');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';

  const fullText = allTranscript.map(e => `[${formatTime(e.time)}] ${e.text}`).join('\n');

  const content = document.getElementById('summaryContent');
  content.innerHTML = '<div class="shimmer"></div><div class="shimmer" style="width:80%"></div><div class="shimmer" style="width:60%"></div>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `당신은 회의록 작성 전문가입니다. 회의 내용을 분석하여 JSON 형식으로만 응답하세요. 다른 텍스트 없이 순수 JSON만 반환하세요.
형식: {
  "summary": ["핵심 내용 요약 3~5개"],
  "actions": ["액션 아이템 3~5개"],
  "keywords": ["핵심 키워드 5~8개"]
}`,
        messages: [{
          role: "user",
          content: `다음 회의 내용을 분석해주세요:\n\n${fullText}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderSummaryResult(parsed);

  } catch (e) {
    content.innerHTML = '<span style="color:var(--red)">오류가 발생했습니다. API 키를 확인해주세요.</span>';
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '✨ AI 회의록 재생성';
}

let summaryData = null;

function renderSummaryResult(data) {
  summaryData = data;
  showTab(activeTab);
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showTab(tab);
}

function showTab(tab) {
  const content = document.getElementById('summaryContent');
  if (!summaryData) {
    content.innerHTML = '<span style="color:var(--text3); font-size:13px;">AI 회의록을 먼저 생성해주세요.</span>';
    return;
  }

  if (tab === 'summary') {
    content.innerHTML = '<ul class="summary-list">' +
      (summaryData.summary || []).map(s => `<li>${s}</li>`).join('') +
      '</ul>';
  } else if (tab === 'actions') {
    content.innerHTML = '<div class="action-items">' +
      (summaryData.actions || []).map(a => `
        <div class="action-item">
          <div class="action-check" onclick="toggleCheck(this)"></div>
          <span>${a}</span>
        </div>
      `).join('') +
      '</div>';
  } else if (tab === 'keywords') {
    content.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
      (summaryData.keywords || []).map(k => `
        <span class="chip active" onclick="searchFromKeyword('${k}')">${k}</span>
      `).join('') +
      '</div><div style="font-size:11px;color:var(--text3);margin-top:10px;">클릭하여 파일 검색</div>';
  }
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  el.textContent = el.classList.contains('checked') ? '✓' : '';
}

// ─── Helpers ────────────────────────────────────────────
function formatTime(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function formatTimerDisplay(secs) {
  return formatTime(secs);
}
